{% extends 'base.html' %}

{% block title %}Login Administrador - Voz Ciencia{% endblock %}

{% block content %}
<div class="glass-panel" style="padding: 2rem; margin-top: auto; margin-bottom: auto;">
    <div class="text-center mb-6">
        <h2 class="text-muted" style="margin-top: 0.5rem; font-size: 1.25rem;">Panel de Administración</h2>
    </div>

    <form method="post" action="{% url 'admin_login' %}">
        {% csrf_token %}

        {% if form.errors %}
        <div class="mb-4"
            style="padding: 0.75rem; background: rgba(239, 68, 68, 0.1); border-left: 4px solid var(--error); border-radius: 0.5rem;">
            <p class="error-text" style="margin: 0;">Usuario o contraseña incorrectos.</p>
        </div>
        {% endif %}

        <div class="form-group">
            <label for="id_username">Usuario</label>
            <input type="text" name="username" id="id_username" required autofocus placeholder="Ingresa tu usuario">
        </div>

        <div class="form-group">
            <label for="id_password">Contraseña</label>
            <input type="password" name="password" id="id_password" required placeholder="Ingresa tu contraseña">
        </div>

        <button type="submit" class="btn-primary" style="margin-top: 1rem;">
            Iniciar Sesión
        </button>

        <input type="hidden" name="next" value="{{ next|default:'/admin-dashboard/' }}" />
    </form>
</div>
{% endblock %}
